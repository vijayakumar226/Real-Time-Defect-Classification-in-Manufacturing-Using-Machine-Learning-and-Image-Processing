<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Defect Classification - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-white">
  <div class="container">
    <div class="topbar">
      <div>
        <div class="h1 blue">Defect Classification</div>
        <div class="muted">Select one mode to continue</div>
      </div>
      <a class="link-pill" href="/docs" target="_blank">API Docs</a>
    </div>

    <div class="card">
      <div class="h2">Choose Input</div>

      <div class="grid2">
        <a class="big-btn border-blue" href="/webcam">
          <div class="big-title blue">Webcam</div>
          <div class="big-sub">Open camera → capture → detect</div>
          <div class="tag green">Live</div>
        </a>

        <a class="big-btn border-yellow" href="/upload">
          <div class="big-title orange">Upload Image</div>
          <div class="big-sub">Select file → detect → output</div>
          <div class="tag red">File</div>
        </a>
      </div>
    </div>

    <div class="footer muted">
      Tip: Use Chrome/Edge and allow camera permissions for Webcam mode.
    </div>
  </div>
</body>
</html>
